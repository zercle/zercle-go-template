apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zercle-go-template

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: zercle-go-template
      app.kubernetes.io/part-of: zercle-go-template

images:
  - name: zercle-go-template
    newName: zercle-go-template
    newTag: latest
  - name: zercle-go-template-migrate
    newName: zercle-go-template-migrate
    newTag: latest

configMapGenerator:
  - name: zercle-go-template-config
    literals:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DB_HOST=postgres-service
      - DB_PORT=5432
      - DB_NAME=app
      - DB_SSLMODE=require
      - DB_MAX_CONNS=25
      - DB_MIN_CONNS=5
      - CACHE_HOST=valkey-service:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - METRICS_ENABLED=true
      - METRICS_PORT=9090

secretGenerator:
  - name: zercle-go-template-secrets
    literals:
      - DB_PASSWORD=CHANGE_ME
      - DB_USER=CHANGE_ME
      - CACHE_PASSWORD=CHANGE_ME
      - AUTH_ACCESS_TOKEN_SECRET=CHANGE_ME
      - AUTH_REFRESH_TOKEN_SECRET=CHANGE_ME

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - migration-job.yaml