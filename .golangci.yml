version: "2"
run:
  tests: true
  timeout: 5m
linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - gocritic
    - gocyclo
    - revive
    - ineffassign
    - unconvert
    - goconst
    - prealloc
    - misspell
    - bodyclose
    - sqlclosecheck
    - nilerr
    - nestif
    - forcetypeassert
    - exhaustive
    - funlen
    - testifylint
    - modernize
    - gosec
    - errorlint
    - wrapcheck
    - paralleltest
    - tparallel
    - thelper
    - forbidigo

  disable:
    - lll

  settings:
    dupl:
      threshold: 20
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 120
      statements: 80
    goconst:
      min-len: 2
      min-occurrences: 3
    gocyclo:
      min-complexity: 15
    testifylint:
      disable:
        - float-compare

  exclusions:
    generated: lax
    paths:
      - examples$
    rules:
      - linters:
          - revive
        text: "^unused-parameter:"
      - linters:
          - revive
        text: "^package-comments:"
      - linters:
          - errcheck
        text: 'Error return value of `.*\.Body\.Close` is not checked'
      - linters:
          - dupl
          - goconst
          - funlen
          - errcheck
          - forcetypeassert
          - revive
        path: '_test\.go$'
      - linters:
          - revive
        path: "tests/"

issues:
  max-issues-per-linter: 0
  max-same-issues: 100

formatters:
  enable:
    - gofmt
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
