# =============================================================================
# GitHub Actions CI/CD Workflow
# =============================================================================
# This workflow provides continuous integration for the Go API with testcontainers.
#
# Triggers:
#   - Push to main/develop branches
#   - Pull requests to main/develop branches
#
# Jobs:
#   - lint: Code linting with golangci-lint
#   - unit-tests: Run unit tests with race detection and coverage
#   - integration-tests: Run integration tests with testcontainers (podman)
#   - build: Build binary (after lint and unit tests pass)
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "stable"

jobs:
  # ==========================================================================
  # Job: Lint
  # ==========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  # ==========================================================================
  # Job: Unit Tests
  # ==========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -short -race -coverprofile=coverage-unit.txt -covermode=atomic ./...

      - name: Upload unit test coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage-unit.txt
          flags: unit

  # ==========================================================================
  # Job: Integration Tests
  # ==========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Enable podman socket for rootless containers
      - name: Start podman service
        run: |
          systemctl --user start podman.socket
          echo "DOCKER_HOST=unix:///run/user/$UID/podman/podman.sock" >> $GITHUB_ENV

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -race -coverprofile=coverage-integration.txt -covermode=atomic ./test/integration/...
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload integration test coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage-integration.txt
          flags: integration

  # ==========================================================================
  # Job: Build
  # ==========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: go build -o bin/server ./cmd/server
