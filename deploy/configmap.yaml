apiVersion: v1
kind: ConfigMap
metadata:
  name: zercle-go-template-config
  namespace: zercle-go-template
data:
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "app"
  DB_SSLMODE: "require"
  DB_MAX_CONNS: "25"
  DB_MIN_CONNS: "5"
  CACHE_HOST: "valkey-service:6379"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"