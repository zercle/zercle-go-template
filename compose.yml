version: '3.9'

services:
  postgres:
    image: postgres:18-alpine
    container_name: ${APP_NAME:-zercle-go-template}-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-app}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ${APP_NAME:-zercle-go-template}-network

  redis:
    image: redis:9-alpine
    container_name: ${APP_NAME:-zercle-go-template}-redis
    command: redis-server --appendonly yes
    environment:
      REDIS_PASSWORD: ${CACHE_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ${APP_NAME:-zercle-go-template}-network

  adminer:
    image: adminer:4.8.1
    container_name: ${APP_NAME:-zercle-go-template}-adminer
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      - postgres
    networks:
      - ${APP_NAME:-zercle-go-template}-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ${APP_NAME:-zercle-go-template}-network:
    driver: bridge
