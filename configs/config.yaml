app:
  name: zercle-go-template
  version: 1.0.0
  environment: development

server:
  grpc:
    host: 0.0.0.0
    port: 50051
  http:
    host: 0.0.0.0
    port: 8080

database:
  host: localhost
  port: 5432
  name: zercle_chat
  user: postgres
  password: postgres
  ssl_mode: disable
  max_connections: 25
  max_idle_conns: 5

valkey:
  host: localhost
  port: 6379
  password: ""
  db: 0

auth:
  jwt_secret: "your-256-bit-secret-key-here-change-in-production"
  jwt_expiry: 24h
  refresh_expiry: 168h

logging:
  level: info
  format: json
