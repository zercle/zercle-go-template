# sqlc.yaml - sqlc code generation configuration
# See https://docs.sqlc.dev/en/latest/reference/config.html

version: "2"

sql:
  - schema: "internal/infrastructure/database/sqlc/user/schema.sql"
    queries: "internal/infrastructure/database/sqlc/user/query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "sqlcuser"
        out: "internal/infrastructure/database/sqlc/user"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_exported_queries: false
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        json_tags_case_style: "snake"
        overrides:
          - db_type: "pg_catalog.timestamp with time zone"
            go_type: "time.Time"
          - db_type: "pg_catalog.uuid"
            go_type: "github.com/google/uuid.UUID"
          - column: "users.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "users.status"
            go_type: "string"

  - schema: "internal/infrastructure/database/sqlc/task/schema.sql"
    queries: "internal/infrastructure/database/sqlc/task/query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "sqlctask"
        out: "internal/infrastructure/database/sqlc/task"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_exported_queries: false
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        json_tags_case_style: "snake"
        overrides:
          - db_type: "pg_catalog.timestamp with time zone"
            go_type: "time.Time"
          - db_type: "pg_catalog.uuid"
            go_type: "github.com/google/uuid.UUID"
          - column: "tasks.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "tasks.user_id"
            go_type: "github.com/google/uuid.UUID"
          - column: "tasks.status"
            go_type: "string"
          - column: "tasks.priority"
            go_type: "string"