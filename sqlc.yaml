version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/db/queries"
    schema: "internal/migrations"
    gen:
      go:
        package: "postgres"
        out: "internal/infrastructure/db/postgres"
        sql_package: "pgx/v5"
        overrides:
          - go_type: "github.com/google/uuid.UUID"
            db_type: "uuid"
          - go_type: "time.Time"
            db_type: "timestamp"
